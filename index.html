<!DOCTYPE html>
<html lang="ru">

<head>

<body>

  <main>
    <section class="container">

      <article class="card">

      <article class="card">
        <h2><a href=#">Gallery</a></h2>
        <p>My Gallery</p>
      </article>

      <article class="card">
        <h2>Weather</h2>
        <p>The weather will be displayed here</p>
      </article>



      <article class="card">
        <h2>Social networks</h2>
        <p>
          <a href="#" target="_blank">Facebook</a><br>

          <a href="#" target="_blank">Instagram</a><br>

</html>
