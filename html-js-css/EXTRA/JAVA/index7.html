<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <title>Интерактивная анимация</title>
  <style>
    /* Стили для элементов */
    #container {
      position: relative;
      width: 500px;
      height: 500px;
      background-color: #eee;
    }

    .ball {
      position: absolute;
      width: 50px;
      height: 50px;
      border-radius: 50%;
      background-color: #007bff;
      cursor: pointer;
    }

    /* Анимация для элементов */
    @keyframes bounce {
      0% {
        transform: translate(0, 0);
      }

      25% {
        transform: translate(0, -200px);
      }

      50% {
        transform: translate(200px, 0);
      }

      75% {
        transform: translate(0, 200px);
      }

      100% {
        transform: translate(-200px, 0);
      }
    }
  </style>
</head>

<body>
  <div id="container">
    <div class="ball"></div>
  </div>

  <script>
    // Получение элемента и добавление обработчика событий
    const ball = document.querySelector('.ball');
    ball.addEventListener('click', () => {
      // Запуск анимации при клике на элемент
      ball.style.animation = 'bounce 2s ease-in-out 0s infinite alternate';
    });
  </script>
</body>

</html>
