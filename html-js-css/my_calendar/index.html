<!DOCTYPE html>

  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    html,
    body {
      height: 100%;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
    }

    section {
      display: flex;
      flex: 1;
      /* Это значение будет переопределено для .head и .days */
      min-height: 0;
    }

    .head {
      flex: 0.74;
      /* 8% от 12.5% */
    }

    .days {
      flex: 0.26;
      /* 4.5% от 12.5% */
    }

    article {
      flex: 1;
      border: 1px solid black;
      padding: 10px;
      box-sizing: border-box;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 0;
    }

    .dates {
      width: 100%;
      height: 100%;
      overflow: hidden;
      word-wrap: break-word;
    }
  </style>
</head>
