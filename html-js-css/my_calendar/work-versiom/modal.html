<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>

<body>
  <div id="modal" class="modal">
    <div class="modal-content">
      <h4>Выберите время</h4>
      <p>Выберите промежуток времени и введите событие:</p>

      <select id="time-slot">
        <!-- Тут будут динамически добавлены промежутки времени -->
      </select>

      <input type="text" id="event-input" placeholder="Ваше событие">

      <button id="save-event">Сохранить</button>
      <button id="cancel">Отмена</button>
    </div>
  </div>
  <style>
    .modal {
      display: none;
      position: fixed;
      z-index: 1;
      padding-top: 100px;
      width: 100%;
      height: 100%;
      overflow: auto;
      background-color: rgb(0, 0, 0);
      background-color: rgba(0, 0, 0, 0.4);
    }

    .modal-content {
      position: relative;
      margin: auto;
      padding: 20px;
      width: 80%;
      max-width: 500px;
      background-color: #fff;
    }

    button {
      margin-top: 10px;
    }
  </style>

  <script>
    // Находим модальное окно и кнопки в HTML
    const modal = document.getElementById('modal');
    const saveButton = document.getElementById('save-event');
    const cancelButton = document.getElementById('cancel');

    // Заполняем промежутки времени
    const timeSlotSelect = document.getElementById('time-slot');
    for (let i = 8; i <= 20; i++) {
      const option = document.createElement('option');
      option.value = i;
      option.text = `${i}:00 - ${i + 1}:00`;
      timeSlotSelect.appendChild(option);
    }

    // Функция для отображения модального окна
    function showModal() {
      modal.style.display = 'block';
    }

    // Функция для скрытия модального окна
    function hideModal() {
      modal.style.display = 'none';
    }

    // Обработка нажатия кнопки сохранить
    saveButton.addEventListener('click', function () {
      const timeSlot = timeSlotSelect.value;
      const eventText = document.getElementById('event-input').value;

      // TODO: Сохранить событие на выбранный промежуток времени

      hideModal();
    });

    // Обработка нажатия кнопки отмена
    cancelButton.addEventListener('click', function () {
      hideModal();
    });

  </script>
</body>

</html>
