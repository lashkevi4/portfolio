<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Стартовая страница</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f2f2f2;
      padding: 30px;
    }

    .container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
    }

    .card {
      background-color: white;
      padding: 20px;
      border-radius: 5px;
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
      text-align: center;
      width: 200px;
    }

    a {
      text-decoration: none;
      color: #2196F3;
    }

    .search-container {
      display: flex;
      justify-content: center;
      margin-bottom: 20px;
    }

    input[type="search"] {
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 5px;
      width: 300px;
    }
  </style>
</head>

<body>
  <h1>Моя стартовая страница</h1>

  <div class="search-container">
    <form action="https://www.google.com/search" method="get">
      <input type="search" name="q" placeholder="Поиск">
    </form>
  </div>

  <div class="container">
    <div class="card">
      <h2>Погода</h2>
      <p>Здесь будет отображаться погода</p>
    </div>
    <div class="card">
      <h2><a href="portfolio.html">Портфолио</a></h2>
      <p>Перейдите на страницу моего портфолио</p>
    </div>
    <div class="card">
      <h2><a href="gallery.html">Фотогалерея</a></h2>
      <p>Посмотрите мои фотографии</p>
    </div>
  </div>
</body>

</html>
